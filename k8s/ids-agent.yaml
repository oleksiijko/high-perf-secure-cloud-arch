apiVersion: apps/v1
kind: Deployment
metadata:
  name: ids-agent
  namespace: microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ids-agent
  template:
    metadata:
      annotations:             
        istio.io/inject: "false"
      labels:
        app: ids-agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 65532
      hostPID: true
      containers:
        - name: ids-agent
          image: ids-agent:latest
          imagePullPolicy: IfNotPresent

          startupProbe:
            exec: { command: ["bash","-c","echo ok"] }
            failureThreshold: 10      # 20 с
            periodSeconds: 2
          readinessProbe:
            exec: { command: ["bash","-c","echo ok"] }
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["bash","-c","pgrep -f agent.py"] }
            periodSeconds: 30
          env:
            - name: SIEM_URL
              value: http://siem.local/ingest
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits:   { cpu: "750m", memory: "512Mi" }
          securityContext:
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ids-agent
  namespace: microservices
spec:
  selector:
    app: ids-agent
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ids-agent
  namespace: microservices
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ids-agent
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 80 }