version: '3.9'  # Compose specification

services:
  account-svc:
    build: ./src/account-svc
    command: node /app/server.js
    ports: ["3001:3000"]

  content-svc:
    build: ./src/content-svc
    command: node /app/server.js
    ports: ["3002:3000"]

  analytics-svc:
    build: ./src/analytics-svc
    command: node /app/server.js
    ports: ["3003:3000"]

  redis:
    image: redis:7-alpine
    networks:
      - internal_net

networks:
  internal_net:
    driver: bridge
