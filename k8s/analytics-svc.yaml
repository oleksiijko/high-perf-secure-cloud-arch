apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-svc
  namespace: microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-svc
  template:
    metadata:
      annotations:     
        istio.io/dataplane-mode: ambient
      labels:
        app: analytics-svc
        role: backend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: analytics-svc
          image: analytics-svc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000

          # ── probes ─────────────────────────────
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 30   # ≈ 60 с до kill’а
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10

          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: DISABLE_RL
              value: "true"
            - name: LOG_DIR
              value: /app/logs
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-svc
  namespace: microservices
spec:
  selector:
    app: analytics-svc
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-svc
  namespace: microservices
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-svc
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 80 }