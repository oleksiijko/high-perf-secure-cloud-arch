apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-svc
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crypto-svc
  template:
    metadata:
      annotations:           
        sidecar.istio.io/proxyCPU: "200m"
        sidecar.istio.io/proxyMemory: "256Mi"
        proxy.istio.io/config: |
          {"holdApplicationUntilProxyStarts": true}
      labels:
        app: crypto-svc
        role: backend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: crypto-svc
          image: crypto-svc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000

          # ── probes ─────────────────────────────
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 15   # ≈ 60 с до kill’а
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10

          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: LOG_DIR
              value: /app/logs
            - name: CRYPTO_KEY
              valueFrom:
                secretKeyRef:
                  name: crypto-key
                  key: key
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          volumeMounts:
            - name: tmp-storage
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tmp-storage
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: crypto-svc
  namespace: microservices
spec:
  selector:
    app: crypto-svc
  ports:
    - name: http
      port: 80
      targetPort: 3000
