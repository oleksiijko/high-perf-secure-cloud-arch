apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-svc
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: content-svc
  template:
    metadata:
      labels:
        app: content-svc
        role: backend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: content-svc
          image: content-svc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: CERT_DIR
              value: /certs
            - name: LOG_DIR
              value: /app/logs
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: tls
              mountPath: /certs
            - name: logs
              mountPath: /app/logs
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tls
          secret:
            secretName: tls-secret
              items:
                - key: tls.crt
                  path: server.crt
                - key: tls.crt
                  path: ca.crt
                - key: tls.key
                  path: server.key
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: content-svc
  namespace: microservices
spec:
  selector:
    app: content-svc
  ports:
    - port: 80
      targetPort: 3000
