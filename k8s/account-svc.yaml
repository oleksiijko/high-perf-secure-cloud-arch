apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-svc
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-svc
  template:
    metadata:
      labels:
        app: account-svc
        role: backend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: account-svc
          image: account-svc:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: CERT_DIR
              value: /certs
            - name: LOG_DIR
              value: /tmp
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: tls
              mountPath: /certs
            - name: tmp-storage
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tls
          secret:
            secretName: tls-secret
        - name: tmp-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: account-svc
  namespace: microservices
spec:
  selector:
    app: account-svc
  ports:
    - port: 80
      targetPort: 3000
