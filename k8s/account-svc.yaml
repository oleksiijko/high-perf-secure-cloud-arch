apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-svc
  namespace: microservices
spec:
  replicas: 2
  selector:
    matchLabels: { app: account-svc }
  template:
    metadata:
      annotations:             
        istio.io/dataplane-mode: ambient
      labels: { app: account-svc, role: backend }
    spec:
      securityContext: { runAsNonRoot: true }
      containers:
        - name: account-svc
          image: account-svc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 15 
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          env:
            - name: DISABLE_RL
              value: "true"
            - name: LOG_DIR
              value: /app/logs
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits:   { cpu: "750m", memory: "512Mi" }
          volumeMounts:
            - name: tmp-storage
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tmp-storage
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: account-svc
  namespace: microservices
spec:
  selector:
    app: account-svc
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: account-svc
  namespace: microservices
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: account-svc
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 80 }