name: CI
on: [push, pull_request]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Docker / Buildx ---
      - uses: docker/setup-buildx-action@v3
      - name: docker compose config
        run: docker compose config -q

      # --- Node tests ---
      - uses: actions/setup-node@v4
        with: { node-version: '18', cache: 'npm' }
      - run: npm ci
      - run: npm install --prefix src/account-svc
      - run: npm install --prefix src/content-svc
      - run: npm install --prefix src/analytics-svc
      - run: npm test

      # --- Terraform ---
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.7.5'
      - name: Terraform format check
        run: terraform -chdir=terraform fmt -check -recursive
        
      - name: Terraform init
        run: terraform -chdir=terraform init -no-color -backend=false
        
      - name: Terraform validate
        run: terraform -chdir=terraform validate -no-color
        
      - uses: terraform-linters/setup-tflint@v1
      - name: tflint
        run: tflint --chdir=terraform

      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install JMeter
        run: |
          curl -L https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.2.tgz -o jmeter.tgz
          tar -xzf jmeter.tgz
          sudo mv apache-jmeter-5.6.2 /opt/jmeter
          echo "/opt/jmeter/bin" >> $GITHUB_PATH
      - name: Run JMeter
        run: jmeter -n -t jmeter/microservices-test-plan.jmx -l logs/sample_run.csv
      - run: pip install pandas matplotlib
      - run: python3 scripts/plot_metrics.py
      - run: python3 scripts/aggregate_metrics.py

      # --- Trivy Scan ---
      - name: Install Trivy
        if: env.DOCKER_IMAGE != ''
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          skip-dirs: node_modules,__tests__,.git
      

