apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-node-rules
  namespace: kube-system
data:
  node_rules.yaml: |
    - rule: NodeJS Exec Unexpected
      desc: Detect unexpected exec in Node.js
      condition: evt.type = execve and proc.name=node and not proc.args contains "node"
      output: "Node.js execve detected (command=%proc.cmdline)"
      priority: WARNING
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: falco
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: falco
  template:
    metadata:
      labels:
        app: falco
    spec:
      containers:
      - name: falco
        image: falcosecurity/falco:latest
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: dev-fs
          mountPath: /host/dev
        - name: proc-fs
          mountPath: /host/proc
        - name: rules
          mountPath: /etc/falco/rules.d
      volumes:
      - name: dev-fs
        hostPath:
          path: /dev
      - name: proc-fs
        hostPath:
          path: /proc
      - name: rules
        configMap:
          name: falco-node-rules
