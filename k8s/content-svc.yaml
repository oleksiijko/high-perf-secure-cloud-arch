apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-svc
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: content-svc
  template:
    metadata:
      annotations:             
        sidecar.istio.io/proxyCPU: "200m"
        sidecar.istio.io/proxyMemory: "256Mi"
        proxy.istio.io/config: |
          {"holdApplicationUntilProxyStarts": true}
      labels:
        app: content-svc
        role: backend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: content-svc
          image: content-svc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000

          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 15  
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: DISABLE_RL
              value: "true"
            - name: LOG_DIR
              value: /app/logs
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false  
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: content-svc
  namespace: microservices
spec:
  selector:
    app: content-svc
  ports:
    - name: http
      port: 80
      targetPort: 3000
