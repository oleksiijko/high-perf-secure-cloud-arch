name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      image:
        description: "Container image for Trivy scan"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm ci --prefix src/account-svc
      - run: npm test --prefix src/account-svc
      - run: npm ci --prefix src/content-svc
      - run: npm test --prefix src/content-svc
      - run: npm ci --prefix src/analytics-svc
      - run: npm test --prefix src/analytics-svc

      - uses: hashicorp/setup-terraform@v2
      - run: terraform -chdir=terraform init -backend=false
      - run: terraform -chdir=terraform fmt -check -recursive
      - run: terraform -chdir=terraform validate

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas matplotlib
      - run: python3 scripts/aggregate_metrics.py
      - run: python3 scripts/plot_metrics.py

      - name: Trivy scan
        if: github.event.inputs.image != ''
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ github.event.inputs.image }}
          format: table
          ignore-unfixed: true
          exit-code: '0'

