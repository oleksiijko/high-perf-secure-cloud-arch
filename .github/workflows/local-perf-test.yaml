# This workflow provisions a local Kubernetes cluster using kind and runs JMeter
# performance tests against the microservices.
#
# To run these steps manually on your workstation:
#   1. Install Docker, kubectl and kind (or minikube).
#   2. Create a cluster with three nodes, for example:
#        kind create cluster --config=- <<'CFG'
#        kind: Cluster
#        apiVersion: kind.x-k8s.io/v1alpha4
#        nodes:
#          - role: control-plane
#          - role: worker
#          - role: worker
#        CFG
#   3. kubectl apply -f k8s/ --recursive
#      istioctl install -y --set profile=minimal  # optional
#      kubectl apply -f k8s/istio/                # if Istio manifests exist
#   4. Wait until all pods are ready:
#        kubectl wait --for=condition=available deployment --all -A --timeout=600s
#   5. Run the JMeter plan three times for each profile:
#        mkdir results
#        for p in light medium heavy; do
#          for i in 1 2 3; do
#            jmeter -n -t jmeter/microservices-test-plan.jmx \
#                   -p jmeter/profiles/$p.properties \
#                   -l results/$p-$i.jtl
#          done
#        done
#   6. Aggregate metrics: python3 metrics.py results
#
name: Local Performance Test

on:
  workflow_dispatch:
    inputs:
      throughput_threshold:
        description: 'Fail if mean throughput is below this value'
        required: false
      latency_threshold:
        description: 'Fail if mean p95 latency is above this value'
        required: false

jobs:
  perf:
    runs-on: ubuntu-latest
    env:
      THROUGHPUT_THRESHOLD: ${{ github.event.inputs.throughput_threshold || '0' }}
      LATENCY_THRESHOLD: ${{ github.event.inputs.latency_threshold   || '1000000000' }}
      CLUSTER_NAME: kind

    steps:
    # ─────────────────────── repo ───────────────────────
    - uses: actions/checkout@v4

    # ─────────────────────── kubectl ───────────────────────
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: v1.28.0

    # ─────────────────────── kind cluster ───────────────────────
    - name: Set up kind cluster (3 nodes)
      uses: engineerd/setup-kind@v0.5.0
      with:
        version: v0.20.0
        config: kind-config.yaml

    # ─────────────────────── metrics-server ───────────────────────
    - name: Install metrics-server in kind
      shell: bash
      run: |
        set -e
        kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
        kubectl -n kube-system patch deployment metrics-server --type=json -p='[
          {"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"},
          {"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-preferred-address-types=InternalIP,Hostname,ExternalIP"}
        ]'
        kubectl -n kube-system rollout status deployment/metrics-server --timeout=60s

    # ─────────────────────── build & load images ───────────────────────
    - name: Build Docker images
      shell: bash
      run: |
        set -e
        for svc in account-svc analytics-svc auth-svc content-svc crypto-svc ids-agent; do
          docker build -t "${svc}:latest" "./src/${svc}"
        done

    - name: Load images into kind
      shell: bash
      run: |
        set -e
        for svc in account-svc analytics-svc auth-svc content-svc crypto-svc ids-agent; do
          kind load docker-image "${svc}:latest" --name "$CLUSTER_NAME"
        done

    # ─────────────────────── Istio (optional) ───────────────────────
    - name: Install Istio (optional)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        if [ -d "k8s/istio" ]; then
          curl -sL https://istio.io/downloadIstio | ISTIO_VERSION=1.20.1 sh -
          ISTIO_DIR=$(ls -d istio-*)
          echo "${ISTIO_DIR}/bin" >> "$GITHUB_PATH"
          istioctl install -y --set profile=minimal
        fi

    # ─────────────────────── apply manifests ───────────────────────
    - name: Apply Kubernetes manifests
      shell: bash
      run: |
        set -euo pipefail
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/secrets.yaml -n microservices

        failed=0
        apply_file() {
          local f="$1"
          echo "Applying $f"
          if ! kubectl apply -f "$f"; then
            echo "::error::Failed to apply $f"
            failed=1
          fi
        }

        for f in $(find k8s -name '*.yaml' ! -name 'namespace.yaml' ! -name 'secrets.yaml' ! -name 'podsecuritypolicy.yaml' | sort); do
          apply_file "$f"
        done
        if [ -d "k8s/istio" ]; then
          for f in $(find k8s/istio -name '*.yaml' | sort); do
            apply_file "$f"
          done
        fi
        [ $failed -eq 0 ] || exit 1
        kubectl rollout restart deployment -n microservices

    - name: Wait for microservices pods
      shell: bash
      run: kubectl wait --for=condition=available deployment --all -n microservices --timeout=600s || true

    # ─────────────────────── JMeter 5.6.2 ───────────────────────
    - name: Download JMeter 5.6.2
      shell: bash
      run: |
        set -e
        JMETER_VERSION=5.6.2
        curl -sLfO "https://downloads.apache.org/jmeter/binaries/apache-jmeter-${JMETER_VERSION}.tgz"
        tar -xzf "apache-jmeter-${JMETER_VERSION}.tgz"
        export PATH="$PWD/apache-jmeter-${JMETER_VERSION}/bin:$PATH"
        echo "$PWD/apache-jmeter-${JMETER_VERSION}/bin" >> "$GITHUB_PATH"
        jmeter -v   #--- показать версию для логов

    # ─────────────────────── Python deps ───────────────────────
    - name: Install Python dependencies
      shell: bash
      run: |
        python3 -m pip install --upgrade pip
        pip install numpy pandas

    # ─────────────────────── Run JMeter plan ───────────────────────
    - name: Run JMeter test plan
      shell: bash
      run: |
        mkdir results
        for p in light medium heavy; do
          for i in 1 2 3; do
            jmeter -n -Jxstream.safemode=false \
                   -q jmeter/user.properties \
                   -q jmeter/profiles/${p}.properties \
                   -t jmeter/microservices-test-plan.jmx \
                   -l results/${p}-${i}.jtl
          done
        done

    # ─────────────────────── Aggregate metrics ───────────────────────
    - name: Aggregate metrics
      shell: bash
      run: python3 metrics.py results | tee summary.txt

    # ─────────────────────── Upload artefacts ───────────────────────
    - name: Upload JMeter results
      uses: actions/upload-artifact@v4
      with:
        name: jmeter-results
        path: |
          results/*.jtl
          summary.txt
