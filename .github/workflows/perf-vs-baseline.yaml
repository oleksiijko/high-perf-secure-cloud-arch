name: Perf-vs-Baseline
on:                                                 # запускаем из UI
  workflow_dispatch:

env:                                                # общие лимиты
  JMETER_VER: 5.6.2
  THROUGHPUT_THRESHOLD: 0
  LATENCY_THRESHOLD: 1000000000
  BASE_KIND_CFG: .github/kind-1node.yaml
  SECURE_KIND_CFG: kind-config.yaml

# ───────────────────────────────────── baseline ──
jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # 1. Kind-кластер с одним нодом
    - name: Create 1-node kind cluster
      uses: engineerd/setup-kind@v0.5.0
      with:
        version: v0.20.0
        config: ${{ env.BASE_KIND_CFG }}

    # 2. Сборка монолита и загрузка в kind
    - name: Build & load monolith
      shell: bash
      run: |
        docker build -t monolith-svc:latest ./src/monolith-svc
        kind load docker-image monolith-svc:latest

    # 3. Деплой + port-forward
    - name: Deploy monolith and port-forward 8080
      shell: bash
      run: |
        set -euo pipefail
        kubectl apply -f k8s/monolith.yaml
        kubectl wait --for=condition=ready pod -l app=monolith-svc --timeout=180s
        kubectl port-forward svc/monolith-svc 8080:80 >/dev/null 2>&1 &
        echo "PF=$!" >> $GITHUB_ENV
        echo "Monolith ready"

    # 4. Установка JMeter
    - name: Install JMeter
      shell: bash
      run: |
        curl -sL https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VER}.tgz | tar xz
        echo "$PWD/apache-jmeter-${JMETER_VER}/bin" >> "$GITHUB_PATH"

    # 5. Прогоны JMeter
    - name: Run baseline load tests
      shell: bash
      run: |
        mkdir -p results
        for p in light medium heavy; do
          jmeter -n \
            -q jmeter/profiles/${p}.properties \
            -t jmeter/microservices-test-plan.jmx \
            -JaccessToken=NO_AUTH \
            -l results/${p}.jtl
        done

    # 6. Агрегация метрик
    - name: Aggregate metrics (baseline)
      shell: bash
      run: python3 metrics.py results > summary-baseline.txt

    - uses: actions/upload-artifact@v4
      with:
        name: baseline-results
        path: |
          results/*.jtl
          summary-baseline.txt

# ───────────────────────────────────── secure ──
  secure:
    runs-on: ubuntu-latest
    needs: baseline
    env:
      CLUSTER_NAME: kind
    steps:
    - uses: actions/checkout@v4

    # 0. kubectl
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: v1.28.0

    # 1. Kind-кластер с тремя нодами
    - name: Create 3-node kind cluster
      uses: engineerd/setup-kind@v0.5.0
      with:
        version: v0.20.0
        config: ${{ env.SECURE_KIND_CFG }}

    # 2. metrics-server (для HPA в тестах)
    - name: Install metrics-server
      shell: bash
      run: |
        set -e
        kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
        kubectl -n kube-system patch deployment metrics-server --type=json \
          -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
        kubectl -n kube-system rollout status deployment/metrics-server --timeout=60s

    # 3. Сборка сервисов и загрузка в kind
    - name: Build & load microservices
      shell: bash
      run: |
        set -e
        for svc in account-svc analytics-svc auth-svc content-svc crypto-svc ids-agent; do
          docker build -t $svc:latest ./src/$svc
          kind load docker-image $svc:latest --name $CLUSTER_NAME
        done

    # 4. (опционально) Istio
    - name: Install Istio
      shell: bash
      run: |
        if [ -d k8s/istio ]; then
          curl -L https://istio.io/downloadIstio | ISTIO_VERSION=1.20.1 sh -
          ISTIO_DIR=$(ls -d istio-*)
          echo "$ISTIO_DIR/bin" >> "$GITHUB_PATH"
          istioctl install -y --set profile=demo
        fi

    # 5. K8s-манифесты
    - name: Apply k8s manifests
      shell: bash
      run: |
        set -euo pipefail
        kubectl apply -f k8s/namespace.yaml
        kubectl label namespace microservices istio-injection=enabled --overwrite
        kubectl apply -f k8s/secrets.yaml -n microservices
        for f in $(find k8s -name '*.yaml' ! -name 'namespace.yaml' ! -name 'secrets.yaml'); do
          kubectl apply -f "$f"
        done

    # 6. Ждём, пока все поды станут Ready
    - name: Wait for microservice pods
      shell: bash
      run: |
        kubectl wait --for=condition=ready pod -l app -n microservices --timeout=600s

    # 7. Установка JMeter
    - name: Install JMeter
      shell: bash
      run: |
        curl -sL https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VER}.tgz | tar xz
        echo "$PWD/apache-jmeter-${JMETER_VER}/bin" >> "$GITHUB_PATH"

    # 8. Port-forward Istio Ingress + подготовка user.properties
    - name: Port-forward & prepare JMeter props
      shell: bash
      run: |
        set -euo pipefail
        kubectl -n istio-system port-forward svc/istio-ingressgateway 8080:80 >/dev/null 2>&1 &
        PF=$!
        trap 'kill $PF' EXIT

        pip install -q PyJWT==2.9.0
        TOKEN=$(python scripts/make_jwt.py)

        mkdir -p results
        cat > jmeter/user.properties <<EOF
        accessToken=$TOKEN
        host=localhost
        port=8080
        username=demo
        password=demo123
        EOF

        # Проверим, что gateway отдаёт 200
        for i in {1..60}; do
          if curl -fs -H "Authorization: Bearer $TOKEN" http://localhost:8080/api/profile -o /dev/null; then
            echo "Ingress ready"; break; fi
          sleep 2
        done || { echo "::error::Ingress not ready"; exit 1; }

    # 9. Прогоны JMeter
    - name: Run secure load tests
      shell: bash
      run: |
        for profile in light medium heavy; do
          for run in 1 2 3; do
            echo "=== Running $profile / run $run ==="
            jmeter -n \
              -q jmeter/user.properties \
              -q jmeter/profiles/${profile}.properties \
              -t jmeter/microservices-test-plan.jmx \
              -l results/${profile}-${run}.jtl \
              -j results/${profile}-${run}.log
          done
        done

    # 10. Агрегация метрик
    - name: Aggregate metrics (secure)
      shell: bash
      run: python3 metrics.py results > summary-secure.txt

    - uses: actions/upload-artifact@v4
      with:
        name: secure-results
        path: |
          results/*.jtl
          results/*.log
          summary-secure.txt

# ─────────────────────────────────── compare ──
  compare:
    runs-on: ubuntu-latest
    needs: [baseline, secure]
    steps:
    - uses: actions/download-artifact@v4
      with: {name: baseline-results, path: baseline}
    - uses: actions/download-artifact@v4
      with: {name: secure-results,   path: secure}

    - name: Install pandas
      run: pip install pandas

    - name: Compute Δ Secure vs Baseline
      shell: bash
      run: |
        python3 scripts/compare_metrics.py \
          baseline/summary-baseline.txt \
          secure/summary-secure.txt

    - uses: actions/upload-artifact@v4
      with:
        name: delta
        path: delta.csv
