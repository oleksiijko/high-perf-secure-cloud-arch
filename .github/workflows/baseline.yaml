name: Baseline Performance Test
on: workflow_dispatch           # запуск вручную из UI

jobs:
  baseline:
    runs-on: ubuntu-latest
    env:
      JMETER_VERSION: "5.6.2"
      KIND_CLUSTER_NAME: kind
      NAMESPACE: microservices   # единственное место, где задаётся nsё

    steps:
    # ──────────────────────────── 0. код репо ────────────────────────────
    - uses: actions/checkout@v4

    # ─────────────────────── 1. пишем конфиг kind ────────────────────────
    - name: Write kind config
      run: |
        cat > kind-1node.yaml <<'EOF'
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        nodes:
          - role: control-plane
            extraPortMappings:
              - containerPort: 80
                hostPort: 8080
                protocol: TCP
        EOF
        echo "cfg=$(pwd)/kind-1node.yaml" >> "$GITHUB_OUTPUT"

    # ─────────────────────── 2. поднимаем кластер ────────────────────────
    - uses: engineerd/setup-kind@v0.5.0
      with:
        version: v0.20.0
        name: kind
        wait: 300s
        config: kind-1node.yaml          # ← относительный путь!

    # ───────────────────── 3. билдим и грузим образ ──────────────────────
    # ── build → load → deploy (один шаг) ──────────────────
    - name: Build image, load to kind, deploy
      run: |
        # 1. Собираем и загружаем в kind один раз
        docker build -t monolith-svc:latest ./src/monolith-svc
        kind load docker-image monolith-svc:latest

        # 2. Namespace + Deployment/Service
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/monolith.yaml        # ns=microservices

    # ── ожидание pod + port-forward c указанием ns ────────
    - name: Wait for pod Ready & port-forward 8080→80
      id: pf
      shell: bash
      run: |
        set -euo pipefail

        kubectl wait -n "$NAMESPACE" --for=condition=ready pod \
                -l app=monolith-svc --timeout=180s

        kubectl -n "$NAMESPACE" port-forward svc/monolith-svc \
                8080:80 >/dev/null 2>&1 &
        echo "PF_PID=$!" >> "$GITHUB_ENV"

    - name: Install JMeter ${{ env.JMETER_VERSION }}
      shell: bash
      run: |
        set -euo pipefail
        curl -sLO "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VERSION}.tgz"
        tar -xzf "apache-jmeter-${JMETER_VERSION}.tgz"
        echo "$PWD/apache-jmeter-${JMETER_VERSION}/bin" >> "$GITHUB_PATH"
        jmeter -v                    # sanity-check (покажет версию)

    # ──────────────── 6. прогоны JMeter (baseline) ──────────────────────
    - name: Run JMeter baseline profiles
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p results
        for p in light medium heavy; do
          echo "─── profile=$p ───"
          jmeter -n \
            -q "jmeter/profiles/${p}.properties" \
            -t jmeter/microservices-test-plan.jmx \
            -JaccessToken=NO_AUTH \
            -l "results/${p}.jtl"
        done

    # ───────────────── 7. Агрегация результатов в summary-baseline.txt ────────────
    - name: Aggregate metrics
      shell: bash
      run: |
        set -euo pipefail
        python3 metrics.py results > summary-baseline.txt
        cat summary-baseline.txt

    # ──────────────────── 8. Аккуратно гасим port-forward (всегда) ────────────────
    - name: Stop port-forward
      if: always()
      shell: bash
      run: |
        if [[ -n "${PF_PID:-}" ]]; then
          kill "$PF_PID" || true
        fi

    # ─────────────────── 9. Публикуем артефакты (JTL + summary) ───────────────────
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: baseline-results
        path: |
          results/*.jtl
          summary-baseline.txt