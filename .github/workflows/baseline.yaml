name: Baseline Performance Test
on: workflow_dispatch

jobs:
  baseline:
    runs-on: ubuntu-latest
    env:
      JMETER_VERSION: "5.6.2"
      KIND_CLUSTER_NAME: kind
      NAMESPACE: microservices

    steps:
    # 0. код репо
    - uses: actions/checkout@v4

    # 1. поднимаем single-node kind (конфиг прямо здесь)
    - uses: engineerd/setup-kind@v0.5.0
      with:
        version: v0.20.0
        name: ${{ env.KIND_CLUSTER_NAME }}
        wait: 300s
        config: |
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
              extraPortMappings:
                - containerPort: 80
                  hostPort: 8080
                  protocol: TCP

    # 2. build → load → deploy
    - name: Build image, load to kind, deploy manifests
      shell: bash
      run: |
        set -euo pipefail
        docker build -t monolith-svc:latest ./src/monolith-svc
        kind load docker-image monolith-svc:latest --name "$KIND_CLUSTER_NAME"

        kubectl apply -f k8s/namespace.yaml      # содержит ns=microservices
        kubectl apply -f k8s/monolith.yaml       # Deployment + Service

    # 3. ждём pod и port-forward
    - name: Wait pod & port-forward 8080→80
      shell: bash
      run: |
        set -euo pipefail
        kubectl wait -n "$NAMESPACE" --for=condition=ready pod \
               -l app=monolith-svc --timeout=180s

        kubectl -n "$NAMESPACE" port-forward svc/monolith-svc 8080:80 \
               >/dev/null 2>&1 &
        echo "PF_PID=$!" >> "$GITHUB_ENV"

    # 4. install JMeter
    - name: Install JMeter ${{ env.JMETER_VERSION }}
      shell: bash
      run: |
        set -euo pipefail
        curl -sLO "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VERSION}.tgz"
        tar -xzf "apache-jmeter-${JMETER_VERSION}.tgz"
        echo "$PWD/apache-jmeter-${JMETER_VERSION}/bin" >> "$GITHUB_PATH"

    # 5. нагрузочные профили
    - name: Run JMeter baseline
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p results
        for p in light medium heavy; do
          jmeter -n \
            -q "jmeter/profiles/${p}.properties" \
            -t jmeter/microservices-test-plan.jmx \
            -JaccessToken=NO_AUTH \
            -l "results/${p}.jtl"
        done

    # 6. агрегация метрик
    - name: Aggregate metrics
      shell: bash
      run: |
        set -euo pipefail
        python3 metrics.py results > summary-baseline.txt
        cat summary-baseline.txt

    # 7. стоп port-forward
    - name: Stop port-forward
      if: always()
      shell: bash
      run: |
        [[ -n "${PF_PID:-}" ]] && kill "$PF_PID" || true

    # 8. артефакты
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: baseline-results
        path: |
          results/*.jtl
          summary-baseline.txt
