apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-svc
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-svc
  template:
    metadata:
      labels:
        app: analytics-svc
        role: backend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: analytics-svc
          image: analytics-svc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: LOG_DIR
              value: /app/logs
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tls
          secret:
            secretName: tls-secret
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-svc
  namespace: microservices
spec:
  selector:
    app: analytics-svc
  ports:
    - name: http
      port: 80
      targetPort: 3000
