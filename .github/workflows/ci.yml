name: CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE: ${{ secrets.DOCKER_IMAGE || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm install --prefix src/account-svc
      - run: npm install --prefix src/content-svc
      - run: npm install --prefix src/analytics-svc
      - run: npm test

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.7.5'
      - run: terraform -chdir=terraform init -backend=false
      - run: terraform -chdir=terraform fmt -check -recursive
      - run: terraform -chdir=terraform validate

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas matplotlib
      - run: python3 scripts/plot_metrics.py
      - run: python3 scripts/aggregate_metrics.py --baseline logs/baseline_run.csv --secure logs/secure_run.csv || true

      - name: Trivy Scan
        if: env.DOCKER_IMAGE != ''
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}
          format: table
          exit-code: 1
