name: CI
on: [push, pull_request]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Docker / Buildx ---
      - uses: docker/setup-buildx-action@v3
      - name: docker compose config
        run: docker compose config -q

      # --- Node tests ---
      - uses: actions/setup-node@v4
        with: { node-version: '18', cache: 'npm' }
      - run: npm ci --include-workspaces --include=dev
      - run: npm test

      # --- Terraform ---
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.7.5'
      - name: terraform fmt
        run: terraform -chdir=terraform fmt -recursive -check
      - name: terraform validate
        run: terraform -chdir=terraform validate -no-color
      - name: tflint
        uses: terraform-linters/tflint-action@v1

      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install pandas --quiet
      - run: python3 scripts/aggregate_metrics.py

      - name: trivy
        uses: aquasecurity/trivy-action@v0.14.0

