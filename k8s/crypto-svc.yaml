apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-svc
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crypto-svc
  template:
    metadata:
      labels:
        app: crypto-svc
        role: backend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: crypto-svc
          image: crypto-svc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: CERT_DIR
              value: /certs
            - name: CRYPTO_KEY
              valueFrom:
                secretKeyRef:
                  name: crypto-key
                  key: key
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: tls
              mountPath: /certs
            - name: logs
              mountPath: /app/logs
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tls
          secret:
            secretName: tls-secret
            items: 
              - key: tls.key
                path: server.key  
              - key: tls.crt
                path: server.crt
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: crypto-svc
  namespace: microservices
spec:
  selector:
    app: crypto-svc
  ports:
    - port: 80
      targetPort: 3000
