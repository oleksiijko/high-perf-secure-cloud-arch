version: '3.9'  # Compose specification

services:
  account-svc:
    build: ./src/account-svc
    command: node /app/server.js

  content-svc:
    build: ./src/content-svc
    command: node /app/server.js

  analytics-svc:
    build: ./src/analytics-svc
    command: node /app/server.js

  redis:
    image: redis:7-alpine
    networks:
      - internal_net

networks:
  internal_net:
    driver: bridge
