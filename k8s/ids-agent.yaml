apiVersion: apps/v1
kind: Deployment
metadata:
  name: ids-agent
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ids-agent
  template:
    metadata:
      annotations:             
        sidecar.istio.io/proxyCPU: "200m"
        sidecar.istio.io/proxyMemory: "256Mi"
        proxy.istio.io/config: |
          {"holdApplicationUntilProxyStarts": true}
      labels:
        app: ids-agent
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: ids-agent
          image: ids-agent:latest
          imagePullPolicy: IfNotPresent
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 30   # ≈ 60 с до kill’а
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          env:
            - name: SIEM_URL
              value: http://siem.local/ingest
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ids-agent
  namespace: microservices
spec:
  selector:
    app: ids-agent
  ports:
    - name: http
      port: 80
      targetPort: 3000
