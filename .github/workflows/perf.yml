name: Performance CI

on:
  push:
  pull_request:

env:
  THROUGHPUT_THRESHOLD: ${{ secrets.THROUGHPUT_THRESHOLD }}
  LATENCY_THRESHOLD: ${{ secrets.LATENCY_THRESHOLD }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v2
      - name: Terraform apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/
          kubectl apply -f k8s/istio/

  test:
    runs-on: ubuntu-latest
    needs: deploy
    outputs:
      metrics_status: ${{ steps.metrics.outputs.exitcode }}
    steps:
      - uses: actions/checkout@v3
      - name: Wait for pods
        run: |
          kubectl wait --for=condition=available --timeout=300s deployment --all
      - name: Prepare results dir
        run: |
          rm -rf results
          mkdir -p results
      - name: Run JMeter
        run: |
          for profile in light medium heavy; do
            kubectl exec deploy/redis -- redis-cli FLUSHALL || true
            for i in 1 2 3; do
              jmeter -n -t jmeter/microservices-test-plan.jmx \
                -Jprofile=$profile \
                -q jmeter/profiles/${profile}.properties \
                -l results/${profile}-${i}.jtl
            done
          done
      - name: Calculate metrics
        id: metrics
        run: |
          python metrics.py results/ || true
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
        env:
          THROUGHPUT_THRESHOLD: ${{ env.THROUGHPUT_THRESHOLD }}
          LATENCY_THRESHOLD: ${{ env.LATENCY_THRESHOLD }}
      - uses: actions/upload-artifact@v3
        with:
          name: jmeter-results
          path: results/

  gate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Fail if metrics failed
        run: |
          if [ "${{ needs.test.outputs.metrics_status }}" != "0" ]; then
            echo "Performance requirements not met" >&2
            exit 1
          fi
