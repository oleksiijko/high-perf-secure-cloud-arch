apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-svc
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-svc
  template:
    metadata:
      labels:
        app: account-svc
        role: backend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: account-svc
          image: account-svc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DISABLE_RL
              value: "true"
            - name: LOG_DIR
              value: /app/logs
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: tmp-storage
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tmp-storage
          emptyDir: {}
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: account-svc
  namespace: microservices
spec:
  selector:
    app: account-svc
  ports:
    - name: http
      port: 80
      targetPort: 3000
